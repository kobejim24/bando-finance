<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Bando Finance"/><title>Bando Finance</title><style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{background:linear-gradient(135deg,#0a0a0f,#0f0f1a 50%,#0a0f0a);min-height:100vh;font-family:-apple-system,'PingFang TC','Noto Sans TC',sans-serif;color:#e8e8f0;padding-bottom:80px}button{font-family:inherit}input,select{font-family:inherit;outline:none}select{appearance:none}#header{background:rgba(12,12,22,0.97);border-bottom:1px solid rgba(100,200,100,0.15);padding:50px 20px 0;position:sticky;top:0;z-index:100}#header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}#header-label{font-size:11px;color:#64c864;letter-spacing:3px;margin-bottom:2px}#header-title{font-size:22px;font-weight:700}#add-btn{background:linear-gradient(135deg,#64c864,#2a8a2a);border:none;border-radius:12px;padding:10px 16px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}#tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.05);overflow-x:auto}.tab-btn{background:none;border:none;font-size:12px;cursor:pointer;padding:8px 10px 12px;border-bottom:2px solid transparent;color:#666;font-weight:400;white-space:nowrap}.tab-btn.active{color:#64c864;font-weight:700;border-bottom-color:#64c864}#content{padding:20px 16px}.section{display:flex;flex-direction:column;gap:16px}.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px}.card-label{font-size:12px;color:#aaa;margin-bottom:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.stat-card{background:rgba(255,255,255,0.03);border-radius:14px;padding:14px}.stat-label{font-size:11px;color:#888;margin-bottom:4px}.stat-value{font-size:18px;font-weight:700}.net-card{background:linear-gradient(135deg,rgba(100,200,100,0.12),rgba(40,120,40,0.08));border:1px solid rgba(100,200,100,0.2);border-radius:20px;padding:24px 20px;text-align:center}.net-label{font-size:12px;color:#64c864;letter-spacing:2px;margin-bottom:8px}.net-value{font-size:36px;font-weight:800}.bar-wrap{height:4px;background:rgba(255,255,255,0.06);border-radius:2px}.bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#f06060,#c04040)}.bar-wrap6{height:6px;background:rgba(255,255,255,0.06);border-radius:3px}.bar-wrap8{height:8px;background:rgba(255,255,255,0.06);border-radius:4px}.tx-row{display:flex;justify-content:space-between;align-items:center;padding:12px 8px}.tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-right:10px}.divider{height:1px;background:rgba(255,255,255,0.04)}.filter-row{display:flex;gap:8px}.filter-btn{border:none;border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer}.inp{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 12px;color:#e8e8f0;font-size:14px}.inp::placeholder{color:#555}.field{margin-bottom:14px}.field-label{font-size:12px;color:#888;margin-bottom:6px}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end}.modal-overlay.open{display:flex}.modal-box{background:#141420;width:100%;border-radius:20px 20px 0 0;padding:20px;max-height:85vh;overflow-y:auto}.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.modal-title{font-size:16px;font-weight:700}.modal-close{background:none;border:none;color:#888;font-size:18px;cursor:pointer}.confirm-btn{width:100%;padding:14px;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}.type-row{display:flex;gap:8px}.type-btn{flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600}.deposit-row{display:flex;gap:8px}.deposit-inp{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 10px;color:#e8e8f0;font-size:12px}.deposit-inp::placeholder{color:#555}.deposit-btn{border:none;border-radius:10px;padding:8px 14px;color:#fff;font-size:12px;font-weight:600;cursor:pointer}.tag{font-size:11px;color:#888;background:rgba(255,255,255,0.06);border-radius:6px;padding:2px 8px;display:inline-block}.del-btn{background:none;border:none;color:#444;cursor:pointer;font-size:14px;padding:4px}.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.goal-mini{background:rgba(255,255,255,0.04);border-radius:10px;padding:8px 10px}.goal-mini-label{font-size:10px;color:#888}.goal-mini-val{font-size:15px;font-weight:700}.empty{text-align:center;padding:40px;color:#555;font-size:14px}.asset-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}.asset-row:last-child{border-bottom:none}.asset-name{font-size:13px;font-weight:600}.asset-sub{font-size:11px;color:#666;margin-top:2px}.asset-val{text-align:right}.asset-amount{font-size:14px;font-weight:700;color:#64c864}.asset-twd{font-size:10px;color:#666;margin-top:2px}.section-title{font-size:11px;color:#64c864;letter-spacing:2px;margin-bottom:10px;font-weight:600}.total-asset-card{background:linear-gradient(135deg,rgba(100,200,100,0.12),rgba(40,120,40,0.08));border:1px solid rgba(100,200,100,0.2);border-radius:20px;padding:20px;text-align:center}.rate-inp{width:80px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 10px;color:#e8e8f0;font-size:13px;text-align:center}</style></head>
<body><div id="header"><div id="header-top"><div><div id="header-label">BANDO FINANCE</div><div id="header-title">金流管理</div></div><button id="add-btn" onclick="openForm()">+ 新增</button></div><div id="tabs"><button class="tab-btn active" onclick="switchTab('總覽',this)">總覽</button><button class="tab-btn" onclick="switchTab('資產',this)">資產</button><button class="tab-btn" onclick="switchTab('收支',this)">收支</button><button class="tab-btn" onclick="switchTab('投資',this)">投資</button><button class="tab-btn" onclick="switchTab('預算',this)">預算</button><button class="tab-btn" onclick="switchTab('存錢',this)">存錢</button></div></div><div id="content"></div><div class="modal-overlay" id="tx-modal"><div class="modal-box"><div class="modal-header"><div class="modal-title">新增記錄</div><button class="modal-close" onclick="closeForm()">✕</button></div><div class="field"><div class="field-label">日期</div><input type="date" id="f-date" class="inp"/></div><div class="field"><div class="field-label">類型</div><div class="type-row"><button class="type-btn" id="btn-income" onclick="setType('income')" style="background:#64c864;color:#fff">收入</button><button class="type-btn" id="btn-expense" onclick="setType('expense')" style="background:rgba(255,255,255,0.06);color:#aaa">支出</button></div></div><div class="field"><div class="field-label">分類</div><select id="f-cat" class="inp" style="color:#e8e8f0"></select></div><div class="field"><div class="field-label">金額 (TWD)</div><input type="number" id="f-amt" class="inp" placeholder="0"/></div><div class="field"><div class="field-label">備註</div><input type="text" id="f-note" class="inp" placeholder="選填"/></div><button class="confirm-btn" style="background:linear-gradient(135deg,#64c864,#2a8a2a)" onclick="addTx()">確認新增</button></div></div><div class="modal-overlay" id="goal-modal"><div class="modal-box"><div class="modal-header"><div class="modal-title">新增存錢目標</div><button class="modal-close" onclick="closeGoalForm()">✕</button></div><div class="field"><div class="field-label">目標名稱</div><input type="text" id="g-name" class="inp" placeholder="例：買新手機"/></div><div class="field"><div class="field-label">目標金額 (TWD)</div><input type="number" id="g-target" class="inp" placeholder="0"/></div><div class="field"><div class="field-label">目前已存 (TWD)</div><input type="number" id="g-saved" class="inp" placeholder="0"/></div><div class="field"><div class="field-label">目標日期（選填）</div><input type="date" id="g-deadline" class="inp"/></div><div class="field"><div class="field-label">備註（選填）</div><input type="text" id="g-note" class="inp" placeholder="例：含機票住宿學費"/></div><button class="confirm-btn" style="background:linear-gradient(135deg,#4a9eff,#2060cc)" onclick="addGoal()">確認新增</button></div></div>
<script>const CATS={income:["固定薪資","教練課收入","投資獲利","其他收入"],expense:["飲食","交通","娛樂","運動健身","旅遊","購物","醫療","其他支出"]};const DEFAULT_TXS=[{id:1,date:"2026-04-15",type:"income",category:"固定薪資",amount:45000,note:"四月薪資"},{id:2,date:"2026-04-14",type:"income",category:"教練課收入",amount:12000,note:"本週教練課"},{id:3,date:"2026-04-13",type:"expense",category:"飲食",amount:850,note:"與媽媽吃飯"},{id:4,date:"2026-04-12",type:"expense",category:"運動健身",amount:1200,note:"健身補充品"},{id:5,date:"2026-04-10",type:"expense",category:"旅遊",amount:15000,note:"泰國旅遊預付"},{id:6,date:"2026-04-08",type:"income",category:"投資獲利",amount:8500,note:"台股獲利了結"},{id:7,date:"2026-04-05",type:"expense",category:"娛樂",amount:3500,note:"Post Malone 演唱會票"},{id:8,date:"2026-04-03",type:"expense",category:"交通",amount:600,note:"油錢"}];const DEFAULT_INV=[{id:1,name:"台積電 (2330)",type:"台股",cost:150000,current:183000},{id:2,name:"S&P 500 ETF",type:"美股",cost:80000,current:96000},{id:3,name:"Bitcoin",type:"加密貨幣",cost:50000,current:42000},{id:4,name:"台幣定存",type:"定存/基金",cost:200000,current:204000}];const DEFAULT_BUDGETS=[{category:"飲食",budget:8000},{category:"交通",budget:3000},{category:"娛樂",budget:5000},{category:"運動健身",budget:4000},{category:"旅遊",budget:20000},{category:"購物",budget:5000}];const DEFAULT_GOALS=[{id:1,name:"🇺🇸 美國遊學一個月",target:200000,saved:12000,deadline:"2027-04-17",note:"含機票住宿學費生活費。注意：年繳儲蓄險約8萬不可動用",color:"#4a9eff"}];const DEFAULT_ASSETS={usdRate:32,bank:[{id:1,name:"國泰銀行",currency:"TWD",amount:30118},{id:2,name:"中信銀行",currency:"TWD",amount:29022},{id:3,name:"Linebank",currency:"TWD",amount:7505},{id:4,name:"玉山銀行",currency:"TWD",amount:13408}],usd:[{id:1,name:"國泰美金帳戶",currency:"USD",amount:89.63},{id:2,name:"儲蓄險",currency:"USD",amount:8965}],crypto:[{id:1,name:"ETH",exchange:"幣安",qty:0.42877458,cost:3175.74,unit:"USD"},{id:2,name:"BTC",exchange:"幣安",qty:0.01040099,cost:102227.61,unit:"USD"},{id:3,name:"ADA",exchange:"幣安",qty:1111.7714334,cost:0.859,unit:"USD"},{id:4,name:"ETH",exchange:"MAX",qty:0.07001839,cost:3175.74,unit:"USD",note:"質押中"}]};function load(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def}catch(e){return def}}function save(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch(e){}}let txs=load("bf_txs",DEFAULT_TXS);let investments=load("bf_inv",DEFAULT_INV);let budgets=load("bf_budgets",DEFAULT_BUDGETS);let goals=load("bf_goals",DEFAULT_GOALS);let assets=load("bf_assets",DEFAULT_ASSETS);let currentTab="總覽";let currentType="income";let txFilter="all";const fmt=(n)=>new Intl.NumberFormat("zh-TW",{style:"currency",currency:"TWD",maximumFractionDigits:0}).format(n);const fmtUSD=(n)=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:2}).format(n);const pct=(c,v)=>(((v-c)/c)*100).toFixed(2);function switchTab(name,el){currentTab=name;document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));el.classList.add("active");render()}function render(){const el=document.getElementById("content");if(currentTab==="總覽")el.innerHTML=renderOverview();else if(currentTab==="資產")el.innerHTML=renderAssets();else if(currentTab==="收支")el.innerHTML=renderTx();else if(currentTab==="投資")el.innerHTML=renderInv();else if(currentTab==="預算")el.innerHTML=renderBudget();else if(currentTab==="存錢")el.innerHTML=renderGoals()}function getStats(){const income=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);const expense=txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);const net=income-expense;const expByCat={};txs.filter(t=>t.type==="expense").forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+t.amount});return{income,expense,net,expByCat}}function getTotalAssets(){const r=assets.usdRate;const bankTWD=assets.bank.reduce((s,a)=>s+a.amount,0);const usdTWD=assets.usd.reduce((s,a)=>s+a.amount,0)*r;const cryptoCostUSD=assets.crypto.reduce((s,a)=>s+(a.qty*a.cost),0);const cryptoTWD=cryptoCostUSD*r;return{bankTWD,usdTWD,cryptoTWD,total:bankTWD+usdTWD+cryptoTWD,r}}
function renderAssets(){const{bankTWD,usdTWD,cryptoTWD,total,r}=getTotalAssets();const bankRows=assets.bank.map(a=>`<div class="asset-row"><div><div class="asset-name">${a.name}</div><div class="asset-sub">台幣帳戶</div></div><div class="asset-val"><div class="asset-amount">${fmt(a.amount)}</div></div></div>`).join("");const usdRows=assets.usd.map(a=>`<div class="asset-row"><div><div class="asset-name">${a.name}</div><div class="asset-sub">美金帳戶</div></div><div class="asset-val"><div class="asset-amount">${fmtUSD(a.amount)}</div><div class="asset-twd">≈ ${fmt(a.amount*r)}</div></div></div>`).join("");const cryptoRows=assets.crypto.map(a=>`<div class="asset-row"><div><div class="asset-name">${a.name} <span style="font-size:10px;color:#888">${a.exchange}${a.note?' • '+a.note:''}</span></div><div class="asset-sub">數量：${a.qty} ${a.name}</div><div class="asset-sub">平均買入：${fmtUSD(a.cost)}</div></div><div class="asset-val"><div class="asset-amount" style="color:#f0a040">${fmtUSD(a.qty*a.cost)}</div><div class="asset-twd">≈ ${fmt(a.qty*a.cost*r)}</div></div></div>`).join("");return`<div class="section"><div class="total-asset-card"><div style="font-size:12px;color:#64c864;letter-spacing:2px;margin-bottom:8px">總資產（台幣換算）</div><div style="font-size:34px;font-weight:800">${fmt(total)}</div><div style="font-size:11px;color:#888;margin-top:8px">匯率 1 USD = <input class="rate-inp" type="number" value="${r}" onchange="updateRate(this.value)" style="display:inline-block;width:60px;padding:3px 6px;font-size:12px"/> TWD</div></div><div class="grid2"><div class="stat-card" style="border:1px solid #64c86433"><div class="stat-label">🏦 銀行存款</div><div class="stat-value" style="color:#64c864;font-size:15px">${fmt(bankTWD)}</div></div><div class="stat-card" style="border:1px solid #4a9eff33"><div class="stat-label">💵 美金資產</div><div class="stat-value" style="color:#4a9eff;font-size:15px">${fmt(usdTWD)}</div></div></div><div class="stat-card" style="border:1px solid #f0a04033"><div class="stat-label">₿ 加密貨幣</div><div class="stat-value" style="color:#f0a040;font-size:15px">${fmt(cryptoTWD)}</div></div><div class="card"><div class="section-title">🏦 銀行存款（台幣）</div>${bankRows}<div style="display:flex;justify-content:space-between;padding-top:10px;font-size:13px;font-weight:700"><span style="color:#aaa">小計</span><span style="color:#64c864">${fmt(bankTWD)}</span></div></div><div class="card"><div class="section-title">💵 美金帳戶</div>${usdRows}<div style="display:flex;justify-content:space-between;padding-top:10px;font-size:13px;font-weight:700"><span style="color:#aaa">小計</span><span style="color:#4a9eff">${fmtUSD(assets.usd.reduce((s,a)=>s+a.amount,0))} ≈ ${fmt(usdTWD)}</span></div></div><div class="card"><div class="section-title">₿ 加密貨幣（買入成本）</div>${cryptoRows}<div style="display:flex;justify-content:space-between;padding-top:10px;font-size:13px;font-weight:700"><span style="color:#aaa">小計（成本）</span><span style="color:#f0a040">≈ ${fmt(cryptoTWD)}</span></div></div></div>`}function updateRate(val){if(!val||isNaN(val))return;assets.usdRate=Number(val);save("bf_assets",assets);render()}function renderOverview(){const{income,expense,net,expByCat}=getStats();const{total}=getTotalAssets();let expRows="";Object.entries(expByCat).sort((a,b)=>b[1]-a[1]).forEach(([cat,amt])=>{const r=(amt/expense*100).toFixed(1);expRows+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px"><span>${cat}</span><span style="color:#f06060">${fmt(amt)}</span></div><div class="bar-wrap"><div class="bar-fill" style="width:${r}%"></div></div></div>`});let recentRows="";txs.slice(0,4).forEach((t,i)=>{recentRows+=txRowHTML(t)+(i<3?'<div class="divider"></div>':'')});return`<div class="section"><div class="total-asset-card"><div style="font-size:12px;color:#64c864;letter-spacing:2px;margin-bottom:8px">總資產</div><div style="font-size:34px;font-weight:800">${fmt(total)}</div></div><div class="net-card"><div class="net-label">本月淨收支</div><div class="net-value" style="color:${net>=0?'#64c864':'#f06060'}">${net>=0?'+':''}${fmt(net)}</div></div><div class="grid2"><div class="stat-card" style="border:1px solid #64c86433"><div class="stat-label">↑ 收入</div><div class="stat-value" style="color:#64c864">${fmt(income)}</div></div><div class="stat-card" style="border:1px solid #f0606033"><div class="stat-label">↓ 支出</div><div class="stat-value" style="color:#f06060">${fmt(expense)}</div></div></div><div class="card"><div class="card-label">支出分類</div>${expRows}</div><div class="card" style="padding:4px 8px"><div style="font-size:12px;color:#aaa;padding:12px 8px 4px">最近交易</div>${recentRows}</div></div>`}function txRowHTML(t){const up=t.type==="income";return`<div class="tx-row"><div style="display:flex;align-items:center"><div class="tx-icon" style="background:${up?'rgba(100,200,100,0.12)':'rgba(240,96,96,0.12)'}">${up?'↑':'↓'}</div><div><div style="font-size:13px;font-weight:600">${t.category}</div><div style="font-size:11px;color:#666">${t.note||t.date}</div></div></div><div style="display:flex;align-items:center;gap:8px"><div style="text-align:right"><div style="font-size:14px;font-weight:700;color:${up?'#64c864':'#f06060'}">${up?'+':'-'}${fmt(t.amount)}</div><div style="font-size:10px;color:#555">${t.date}</div></div><button class="del-btn" onclick="delTx(${t.id})">✕</button></div></div>`}function renderTx(){const filtered=txFilter==="all"?txs:txs.filter(t=>t.type===txFilter);const colors={all:"#4466ff",income:"#64c864",expense:"#f06060"};const labels={all:"全部",income:"收入",expense:"支出"};let btns=["all","income","expense"].map(v=>`<button class="filter-btn" onclick="setFilter('${v}')" style="background:${txFilter===v?colors[v]:'rgba(255,255,255,0.06)'};color:${txFilter===v?'#fff':'#aaa'}">${labels[v]}</button>`).join("");let rows=filtered.map((t,i)=>txRowHTML(t)+(i<filtered.length-1?'<div class="divider"></div>':'')).join("");return`<div class="section"><div class="filter-row">${btns}</div><div class="card" style="padding:4px 8px">${rows}</div></div>`}function renderInv(){const totalCost=investments.reduce((s,i)=>s+i.cost,0);const totalCurr=investments.reduce((s,i)=>s+i.current,0);const totalGain=totalCurr-totalCost;let rows=investments.map(inv=>{const gain=inv.current-inv.cost;const gp=Number(pct(inv.cost,inv.current));const pos=gain>=0;const w=Math.min((inv.current/totalCurr)*100,100).toFixed(1);return`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:14px;font-weight:600;margin-bottom:2px">${inv.name}</div><div class="tag">${inv.type}</div></div><div style="text-align:right"><div style="font-size:16px;font-weight:700">${fmt(inv.current)}</div><div style="font-size:12px;color:${pos?'#64c864':'#f06060'}">${pos?'+':''}${fmt(gain)} (${pos?'+':''}${gp}%)</div></div></div><div class="bar-wrap" style="margin-top:10px;height:3px"><div style="height:100%;width:${w}%;border-radius:2px;background:${pos?'linear-gradient(90deg,#64c864,#2a8a2a)':'linear-gradient(90deg,#f06060,#c04040)'}"></div></div><div style="font-size:11px;color:#666;margin-top:4px">佔比 ${w}%</div></div>`}).join("");return`<div class="section"><div style="background:linear-gradient(135deg,rgba(100,200,100,0.1),rgba(40,100,40,0.06));border:1px solid rgba(100,200,100,0.18);border-radius:16px;padding:16px"><div style="font-size:11px;color:#64c864;letter-spacing:2px;margin-bottom:4px">投資組合總值</div><div style="font-size:28px;font-weight:800">${fmt(totalCurr)}</div><div style="font-size:14px;color:${totalGain>=0?'#64c864':'#f06060'};margin-top:4px">${totalGain>=0?'▲':'▼'} ${fmt(Math.abs(totalGain))} (${pct(totalCost,totalCurr)}%)</div></div>${rows}</div>`}function renderBudget(){const{expByCat}=getStats();let rows=budgets.map(b=>{const used=expByCat[b.category]||0;const ratio=Math.min((used/b.budget)*100,100).toFixed(1);const over=used>b.budget;const barColor=over?"linear-gradient(90deg,#f06060,#c04040)":Number(ratio)>80?"linear-gradient(90deg,#f0a040,#c07020)":"linear-gradient(90deg,#64c864,#2a8a2a)";return`<div class="card" style="border-color:${over?'rgba(240,96,96,0.3)':'rgba(255,255,255,0.08)'}"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:14px;font-weight:600">${b.category}</span><span style="font-size:12px;color:${over?'#f06060':'#aaa'}">${fmt(used)} / ${fmt(b.budget)}</span></div><div class="bar-wrap6"><div style="height:100%;width:${ratio}%;border-radius:3px;background:${barColor}"></div></div><div style="font-size:11px;color:${over?'#f06060':'#666'};margin-top:6px">${over?'⚠️ 超支 '+fmt(used-b.budget):'剩餘 '+fmt(b.budget-used)}</div><input type="number" placeholder="調整預算金額" class="inp" style="margin-top:10px;font-size:12px;padding:6px 10px" onblur="updateBudget('${b.category}',this.value);this.value=''"/></div>`}).join("");return`<div class="section">${rows}</div>`}function renderGoals(){const{net}=getStats();if(goals.length===0)return`<div><div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button onclick="openGoalForm()" style="background:rgba(74,158,255,0.15);border:1px solid rgba(74,158,255,0.3);border-radius:10px;padding:6px 12px;color:#4a9eff;font-size:12px;cursor:pointer">+ 新增目標</button></div><div class="empty">點上方「+ 新增目標」開始</div></div>`;let rows=goals.map(g=>{const ratio=Math.min((g.saved/g.target)*100,100);const remaining=g.target-g.saved;const done=ratio>=100;const months=net>0?Math.ceil(remaining/net):null;const monthsHtml=months&&!done?`<div style="font-size:11px;color:#888;margin-bottom:10px">💡 以目前月儲蓄 ${fmt(net)} 計算，約需 <span style="color:${g.color};font-weight:700">${months} 個月</span></div>`:"";const doneHtml=done?`<div style="font-size:12px;color:#64c864;margin-bottom:10px">🎉 目標達成！</div>`:"";const depositHtml=!done?`<div class="deposit-row"><input type="number" placeholder="存入金額" class="deposit-inp" id="dep-${g.id}"/><button class="deposit-btn" style="background:${g.color}" onclick="addSaving(${g.id})">存入</button></div>`:"";return`<div class="card" style="border-color:${done?'rgba(100,200,100,0.3)':g.color+'33'}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px"><div><div style="font-size:15px;font-weight:700;margin-bottom:3px">${g.name}</div>${g.note?`<div style="font-size:11px;color:#666">${g.note}</div>`:''} ${g.deadline?`<div style="font-size:11px;color:#888;margin-top:2px">📅 ${g.deadline}</div>`:''}</div><button class="del-btn" onclick="delGoal(${g.id})">✕</button></div><div class="goal-grid"><div class="goal-mini"><div class="goal-mini-label">目標金額</div><div class="goal-mini-val">${fmt(g.target)}</div></div><div class="goal-mini"><div class="goal-mini-label">已存</div><div class="goal-mini-val" style="color:${g.color}">${fmt(g.saved)}</div></div></div><div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:5px"><span>${ratio.toFixed(1)}% 達成</span><span>還差 ${fmt(remaining)}</span></div><div class="bar-wrap8"><div style="height:100%;width:${ratio}%;border-radius:4px;background:${done?'linear-gradient(90deg,#64c864,#2a8a2a)':'linear-gradient(90deg,'+g.color+','+g.color+'88)'}"></div></div></div>${monthsHtml}${doneHtml}${depositHtml}</div>`}).join("");return`<div class="section"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:12px;color:#888">存錢目標</div><button onclick="openGoalForm()" style="background:rgba(74,158,255,0.15);border:1px solid rgba(74,158,255,0.3);border-radius:10px;padding:6px 12px;color:#4a9eff;font-size:12px;cursor:pointer">+ 新增目標</button></div>${rows}</div>`}function setFilter(v){txFilter=v;render()}function openForm(){document.getElementById("tx-modal").classList.add("open");setType("income");const today=new Date().toISOString().split("T")[0];document.getElementById("f-date").value=today}function closeForm(){document.getElementById("tx-modal").classList.remove("open")}function setType(t){currentType=t;const iBtn=document.getElementById("btn-income");const eBtn=document.getElementById("btn-expense");if(t==="income"){iBtn.style.background="#64c864";iBtn.style.color="#fff";eBtn.style.background="rgba(255,255,255,0.06)";eBtn.style.color="#aaa"}else{eBtn.style.background="#f06060";eBtn.style.color="#fff";iBtn.style.background="rgba(255,255,255,0.06)";iBtn.style.color="#aaa"}const sel=document.getElementById("f-cat");sel.innerHTML=CATS[t].map(c=>`<option>${c}</option>`).join("")}function addTx(){const date=document.getElementById("f-date").value;const amt=Number(document.getElementById("f-amt").value);const cat=document.getElementById("f-cat").value;const note=document.getElementById("f-note").value;if(!date||!amt)return;txs.unshift({id:Date.now(),date,type:currentType,category:cat,amount:amt,note});save("bf_txs",txs);document.getElementById("f-amt").value="";document.getElementById("f-note").value="";closeForm();render()}function delTx(id){txs=txs.filter(t=>t.id!==id);save("bf_txs",txs);render()}function updateBudget(cat,val){if(!val)return;budgets=budgets.map(b=>b.category===cat?{...b,budget:Number(val)}:b);save("bf_budgets",budgets);render()}function openGoalForm(){document.getElementById("goal-modal").classList.add("open")}function closeGoalForm(){document.getElementById("goal-modal").classList.remove("open")}function addGoal(){const name=document.getElementById("g-name").value;const target=Number(document.getElementById("g-target").value);if(!name||!target)return;goals.push({id:Date.now(),name,target,saved:Number(document.getElementById("g-saved").value)||0,deadline:document.getElementById("g-deadline").value,note:document.getElementById("g-note").value,color:"#a064ff"});document.getElementById("g-name").value="";document.getElementById("g-target").value="";document.getElementById("g-saved").value="";document.getElementById("g-deadline").value="";document.getElementById("g-note").value="";closeGoalForm();save("bf_goals",goals);render()}function addSaving(id){const inp=document.getElementById("dep-"+id);const amt=Number(inp.value);if(!amt)return;goals=goals.map(g=>g.id===id?{...g,saved:Math.min(g.saved+amt,g.target)}:g);save("bf_goals",goals);render()}function delGoal(id){goals=goals.filter(g=>g.id!==id);save("bf_goals",goals);render()}setType("income");render();</script></body></html>
